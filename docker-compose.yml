# Ghost service
# En dev : image officielle ghost:5-alpine
# En prod : utiliser IMAGE_TAG=votre-user/grand-line-blog:1.2.3 docker compose up
services:
  blog:
    image: ${IMAGE_TAG:-ghost:5-alpine}
    container_name: ghost
    restart: always
    ports:
      - "2368:2368"

    environment:
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      url: http://localhost:2368
      NODE_ENV: development
      # Active le thème grand-line comme thème par défaut
      activeTheme: grand-line-theme
    volumes:
      - ./content/themes/grand-line-theme:/var/lib/ghost/content/themes/grand-line-theme
      - ./content/data:/var/lib/ghost/content/data
      - ./content/settings/routes.yaml:/var/lib/ghost/content/settings/routes.yaml