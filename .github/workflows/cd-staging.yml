name: CD - Deploy Staging (develop)

on:
  push:
    branches: [develop]

env:
  THEME_NAME: grand-line-theme
  BRANCH: develop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Merge sur l'EC2 staging
  # ─────────────────────────────────────────────
  merge-on-ec2:
    name: Merge develop on EC2 Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Merge branche develop sur EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.STAGING_DEPLOY_PATH }}

            echo "==> Configuration Git..."
            git config user.email "ci-bot@ghost-deploy.local"
            git config user.name "CI Deploy Bot"

            echo "==> Fetch toutes les branches..."
            git fetch --all

            echo "==> Checkout develop..."
            git checkout develop

            echo "==> Merge origin/develop (fast-forward)..."
            git merge --ff-only origin/develop

            echo "==> Merge termine sur EC2 staging (branche: develop)"
            git log --oneline -3

  # ─────────────────────────────────────────────
  # JOB 2 : Redémarrage Ghost après le merge
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy Ghost Staging
    runs-on: ubuntu-latest
    needs: merge-on-ec2
    environment: staging

    steps:
      - name: Restart Ghost
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.STAGING_DEPLOY_PATH }}

            echo "==> Redemarrage Ghost en mode development..."
            NODE_ENV=development docker compose up -d --remove-orphans
            docker image prune -f

            echo "==> Ghost staging redémarre (theme: ${{ env.THEME_NAME }})"

  # ─────────────────────────────────────────────
  # JOB 3 : Health check
  # ─────────────────────────────────────────────
  health-check:
    name: Health Check Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging

    steps:
      - name: Verifier que Ghost repond
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2368)
            echo "Ghost staging HTTP status: $STATUS"
            if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 301 ] && [ "$STATUS" -ne 302 ]; then
              echo "Health check echoue"
              docker logs ghost --tail 20
              exit 1
            fi
            echo "Ghost staging operationnel."
