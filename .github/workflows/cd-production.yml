name: CD - Deploy Production (main)

on:
  push:
    branches: [main]

env:
  THEME_NAME: grand-line-theme

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            echo "Backup SQLite..."
            cp content/data/ghost.db content/data/ghost.db.backup-$(date +%Y%m%d-%H%M%S) || true

            echo "Backup routes.yaml..."
            cp content/settings/routes.yaml content/settings/routes.yaml.backup-$(date +%Y%m%d-%H%M%S) || true

            echo "Pull branche main..."
            git fetch origin main
            git checkout main
            git pull origin main

            echo "Demarrage Ghost en production (theme: ${{ env.THEME_NAME }})..."
            NODE_ENV=production docker compose up -d --remove-orphans
            docker image prune -f

            echo "Deploiement production termine."

      - name: Health check production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2368)
            echo "Ghost production HTTP status: $STATUS"
            if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 301 ] && [ "$STATUS" -ne 302 ]; then
              echo "Health check production echoue"
              docker logs ghost --tail 20
              exit 1
            fi
            echo "Ghost production operationnel (theme: ${{ env.THEME_NAME }})."
