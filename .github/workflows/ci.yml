name: CI - Validate Theme

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: GScan Theme Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GScan
        run: npm install -g gscan

      - name: Check theme folder exists
        id: theme_check
        run: |
          if [ -d "content/themes/mon-theme" ] && [ "$(ls -A content/themes/mon-theme)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo " Le dossier content/themes/mon-theme est vide ou absent. Validation ignorée."
          fi

      - name: Install theme dependencies
        if: steps.theme_check.outputs.exists == 'true'
        working-directory: content/themes/mon-theme
        run: |
          if [ -f "package.json" ]; then
            npm ci
          fi
        continue-on-error: true

      - name: Run GScan
        if: steps.theme_check.outputs.exists == 'true'
        run: gscan content/themes/mon-theme --verbose

      - name: Validate docker-compose syntax
        run: docker compose config --quiet
