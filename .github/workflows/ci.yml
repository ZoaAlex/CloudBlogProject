name: CI - Validate Theme

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  THEME_NAME: grand-line-theme

jobs:
  validate:
    name: GScan Theme Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GScan
        run: npm install -g gscan

      - name: Check theme folder exists
        id: theme_check
        run: |
          if [ -d "content/themes/${{ env.THEME_NAME }}" ] && [ "$(ls -A content/themes/${{ env.THEME_NAME }})" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Le dossier content/themes/${{ env.THEME_NAME }} est vide ou absent. Validation ignoree."
          fi

      - name: Install theme dependencies
        if: steps.theme_check.outputs.exists == 'true'
        working-directory: content/themes/${{ env.THEME_NAME }}
        run: |
          if [ -f "package.json" ]; then
            npm ci
          fi
        continue-on-error: true

      - name: Run GScan
        if: steps.theme_check.outputs.exists == 'true'
        run: gscan content/themes/${{ env.THEME_NAME }} --verbose

      - name: Validate routes.yaml syntax
        run: |
          if [ -f "content/settings/routes.yaml" ]; then
            python3 -c "import yaml, sys; yaml.safe_load(open('content/settings/routes.yaml'))" \
              && echo "routes.yaml valide" \
              || (echo "routes.yaml invalide" && exit 1)
          else
            echo "Pas de routes.yaml, skip."
          fi

      - name: Validate docker-compose syntax
        run: docker compose config --quiet
