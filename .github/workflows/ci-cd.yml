name: Build and Push to Amazon ECR

on:
  push:
    branches: [ "main" ] # Déclenche le build lors d'un push sur main
  pull_request:
    branches: [ "main" ] # Déclenche le build lors d'une merge sur main

env:
  IMAGE_TAG: ${{ github.sha }} 
  AWS_REGION: eu-north-1
  # Utilise le SHA du commit comme tag d'image

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest
    environment: aws_ecr_secret

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Debug secrets
      run: |
        echo "ECR_REPO is set: ${{ secrets.ECR_REPOSITORY_NAME != '' }}"
        echo "KEY_ID is set: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}"
        echo "SECRET is set: ${{ secrets.AWS_SECRET_ACCESS_KEY != '' }}"
    # 1. Configuration des identifiants AWS
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        

    # 2. Connexion à Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 3. Build, Tag et Push de l'image
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Debug SSH key
      run: |
        echo "Longueur du secret:"
        echo -n "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | wc -c
        echo "Premières lignes:"
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | head -3    

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        # Vérifie que la clé est bien sur plusieurs lignes
        cat -A ~/.ssh/deploy_key | head -5
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Copy docker-compose to EC2
      run: |
        scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/

    - name: Deploy on EC2
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            'bash -s' << 'ENDSSH'
              # Recrée le .env
              cat > /home/ec2-user/.env << 'ENDENV'
        MYSQL_DATABASE=${{ vars.MYSQL_DATABASE }}
        MYSQL_USER=${{ vars.MYSQL_USER }}
        MYSQL_PASSWORD=${{ vars.MYSQL_PASSWORD }}
        MYSQL_ROOT_PASSWORD=${{ vars.MYSQL_ROOT_PASSWORD }}
        MYSQL_USERNAME=${{ vars.GHOST_USERNAME }}
        MYSQL_PASSWORD=${{ vars.GHOST_PASSWORD }}
        ENDENV

              # Authentification ECR
              aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
                docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

              # Pull et redémarrage
              docker pull ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest
              cd /home/ec2-user && docker compose down
              cd /home/ec2-user && docker compose up -d
        ENDSSH