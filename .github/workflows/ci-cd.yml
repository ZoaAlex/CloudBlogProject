name: CI/CD Ghost Theme

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  GHOST_VERSION: "5-alpine"
  THEME_NAME: "mon-theme"
  IMAGE_NAME: ghost-blog

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Validation du thème Ghost avec GScan
  # ─────────────────────────────────────────────
  validate-theme:
    name: Validate Ghost Theme
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: content/themes/${{ env.THEME_NAME }}/package.json

      - name: Check theme exists
        run: |
          if [ ! -d "content/themes/${{ env.THEME_NAME }}" ]; then
            echo "Dossier du thème introuvable : content/themes/${{ env.THEME_NAME }}"
            echo "Skipping theme validation."
            exit 0
          fi

      - name: Install theme dependencies
        working-directory: content/themes/${{ env.THEME_NAME }}
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "Pas de package.json, skip npm install."
          fi
        continue-on-error: true

      - name: Install GScan
        run: npm install -g gscan

      - name: Run GScan theme validation
        run: |
          if [ -d "content/themes/${{ env.THEME_NAME }}" ]; then
            gscan content/themes/${{ env.THEME_NAME }}
          fi

  # ─────────────────────────────────────────────
  # JOB 2 : Build de l'image Docker
  # ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate-theme
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3 : Déploiement en production (main only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "Mise à jour du projet Ghost..."

            cd ${{ secrets.DEPLOY_PATH }}

            # Pull la dernière version du code
            git pull origin main

            # Pull la nouvelle image Docker
            docker compose pull

            # Redémarrer les services sans downtime
            docker compose up -d --remove-orphans

            # Nettoyage des images inutilisées
            docker image prune -f

            echo "Déploiement terminé avec succès."

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🔍 Vérification de l'état du service Ghost..."
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2368)
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ]; then
              echo "Ghost répond correctement (HTTP $STATUS)"
            else
              echo "Ghost ne répond pas (HTTP $STATUS)"
              exit 1
            fi
