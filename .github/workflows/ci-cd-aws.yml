name: CI/CD - Build, Push & Deploy to AWS EC2

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/grand-line-blog

jobs:
  # ──────────────────────────────────────────
  # JOB 1 : Build & Push image sur Docker Hub
  # ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "❌ DOCKER_USERNAME secret is not set!"
            exit 1
          fi
          echo "✅ DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}"

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
          echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${BRANCH}-${SHORT_SHA}"

      - name: Pull Ghost base image (cache)
        run: docker pull ghost:5-alpine || true
        

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Ne pas login sur les PR (pas de push)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image (PR - validation only, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push image (push sur main/develop)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ github.ref_name == 'main' && 'latest' || 'staging' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # JOB 2 : Deploy sur EC2 AWS (develop → staging)
  # ──────────────────────────────────────────
  deploy-staging:
    name: Deploy Staging (EC2)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.STAGING_DEPLOY_PATH }}

            echo "Pull du code..."
            git fetch origin develop
            git checkout develop
            git pull origin develop

            echo "Pull de la nouvelle image Docker..."
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            docker pull ${{ secrets.DOCKER_USERNAME }}/grand-line-blog:${IMAGE_TAG}

            echo "Redemarrage avec la nouvelle image..."
            IMAGE_TAG="${{ secrets.DOCKER_USERNAME }}/grand-line-blog:${IMAGE_TAG}" \
              docker compose up -d --remove-orphans

            docker image prune -f
            echo "Staging deploye : ${IMAGE_TAG}"

      - name: Health check staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2368)
            echo "HTTP status: $STATUS"
            if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 301 ] && [ "$STATUS" -ne 302 ]; then
              echo "Health check staging echoue (HTTP $STATUS)"
              exit 1
            fi
            echo "Ghost staging OK"

  # ──────────────────────────────────────────
  # JOB 3 : Deploy sur EC2 AWS (main → production)
  # ──────────────────────────────────────────
  deploy-production:
    name: Deploy Production (EC2)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Backup SQLite + Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            echo "Backup SQLite..."
            cp content/data/ghost.db content/data/ghost.db.backup-$(date +%Y%m%d-%H%M%S) || true

            echo "Pull du code..."
            git fetch origin main
            git checkout main
            git pull origin main

            echo "Pull de la nouvelle image Docker..."
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            docker pull ${{ secrets.DOCKER_USERNAME }}/grand-line-blog:${IMAGE_TAG}

            echo "Redemarrage en production..."
            IMAGE_TAG="${{ secrets.DOCKER_USERNAME }}/grand-line-blog:${IMAGE_TAG}" \
              NODE_ENV=production docker compose up -d --remove-orphans

            docker image prune -f
            echo "Production deployee : ${IMAGE_TAG}"

      - name: Health check production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            sleep 12
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:2368)
            echo "HTTP status: $STATUS"
            if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 301 ] && [ "$STATUS" -ne 302 ]; then
              echo "Health check production echoue (HTTP $STATUS)"
              exit 1
            fi
            echo "Ghost production OK"